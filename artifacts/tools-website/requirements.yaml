packages:
  "framer-motion": "For 3D animations, fluid transitions, and glowing hover effects"
  "react-helmet-async": "For per-page SEO management, meta tags, and structured data"
  "date-fns": "For precise date and age calculations"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For conflict-free tailwind class merging"
  "lucide-react": "For beautiful vector icons"

images:
  - path: "artifacts/tools-website/public/images/hero-bg.png"
    description: "Abstract 3D geometric background with floating glass spheres, electric blue and neon purple gradients on deep dark background"
    aspect_ratio: "16:9"

notes:
  - Application is entirely client-side, using React state for all tools
  - Dark mode electric/neon visual language is default
  - SEO uses react-helmet-async injected into the document head
