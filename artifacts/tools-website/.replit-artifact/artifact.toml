kind = "web"
previewPath = "/"
title = "ToolsHub - 200+ Free Online Tools"
version = "1.0.0"
id = "artifacts/tools-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23447
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/tools-website run dev"

[services.env]
PORT = "23447"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/tools-website", "run", "build"]
publicDir = "artifacts/tools-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
